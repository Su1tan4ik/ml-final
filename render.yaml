services:
  - type: web
    name: almaty-traffic
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd ml-final && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OWM_API_KEY
        sync: false          # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true         # redeploy on every push to main
